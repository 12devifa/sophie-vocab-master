<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOPHIE | Vocab Master AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <span class="logo-name">SOPHIE</span><span class="logo-ai">.ai</span>
            </div>
            <div class="splash-tagline">Your vocabulary. Your way.</div>
        </div>
    </div>

    <div class="app-container">
        <header class="apple-header">
            <div class="logo-small">SOPHIE<span>.ai</span></div>
            <div class="header-tools">
                <div id="streakCounter" class="streak-pill">
                    <i class="fas fa-fire" style="color: #ff9d00;"></i> <span id="streakNumber">2</span>
                </div>
                <label class="theme-switch-wrapper">
                    <input type="checkbox" id="themeToggle">
                    <div class="slider">
                        <i class="fas fa-moon slider-icon"></i>
                        <i class="fas fa-sun slider-icon"></i>
                    </div>
                </label>
            </div>
        </header>

        <section class="hero-section">
            <h1 class="hero-title">Learn exactly what you need</h1>
            <h2 class="hero-subtitle">Turn your words into mastery</h2>

            <div class="minimal-lang-selector">
                <select id="langSelect">
                    <option value="en-es">EN English → ES Español</option>
                    <option value="fr-de">FR Français → DE Deutsch</option>
                    <option value="es-de">ES Español → DE Deutsch</option>
                    <option value="en-de">EN English → DE Deutsch</option>
                </select>
            </div>

            <div class="input-wrapper">
                <textarea id="textInput" placeholder="Paste your words, notes or phrases...&#10;Ej: meeting, Vertrag, invoice, deadline tomorrow..."></textarea>
                <input type="file" id="fileUpload" style="display: none;" accept=".txt,.pdf,image/*">
            </div>

            <button id="magicOrderBtn" class="apple-primary-btn">
                <i class="fas fa-play"></i> Start learning
            </button>
            <p class="micro-promise" id="microPromise">🎧 Audio training ready in seconds</p>

            <div id="wowSummary" class="premium-summary" style="display: none;">
                <h3>🧩 Your learning set is ready</h3>
                <div class="summary-details">
                    <div class="stat-highlight">📊 <span id="termCount">0</span> key terms detected</div>
                    <div>⚡ Optimized for fast learning</div>
                    <div>🎧 Audio training ready</div>
                </div>
            </div>

            <button id="processBtn" style="display: none;"></button>
        </section>

        <section class="secondary-tools-menu">
            <button class="tool-btn"><i class="fas fa-plus"></i></button>
            <button class="tool-btn"><i class="fas fa-file-import"></i></button>
            <button class="tool-btn"><i class="fas fa-brain"></i></button>
            <button class="tool-btn"><i class="fas fa-download"></i></button>
        </section>

            <section class="lab-section">
                <h2><i class="fas fa-flask"></i> Laboratorio de Estudio</h2>
                <div class="controls-row">
                    <select id="audioMode">
                        <option value="basic">Sólo Vocabulario</option>
                        <option value="full">Vocabulario + Frases</option>
                    </select>
                    <button id="playSession" class="icon-btn" style="width: auto; padding: 0 15px; gap: 8px;">
                        <i class="fas fa-play"></i> Escuchar todo
                    </button>
                </div>
                <div id="labList">
                    </div>
            </section>

            <section class="gallery-section">
                <h2><i class="fas fa-box-archive"></i> Mi Biblioteca</h2>
                <div id="notebookGallery">
                    </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script src="app.js?v=11"></script>
</body>
</html>
