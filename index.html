<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SOPHIE: Vocab Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="https://fav.farm/🎧">
    <link rel="icon" href="https://fav.farm/🎧">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🎧 SOPHIE: Vocab Master</h1>
            <p>Hands-free learning universe</p>
        </header>

        <main class="grid-layout">
<section class="card input-col">
                <div class="card-header">
                    <span class="icon">📥</span>
                    <h2>Input</h2>
                </div>
                <textarea id="textInput" placeholder="Escribe o pega aquí..."></textarea>
                
                <div class="file-actions" style="margin: 10px 0; display: flex; gap: 10px;">
                    <label for="fileUpload" class="secondary-btn" style="flex: 1; text-align: center; cursor: pointer; padding: 8px; font-size: 14px; border: 1px solid #dadce0; border-radius: 20px;">
                        📄 Subir PDF/TXT
                    </label>
                    <input type="file" id="fileUpload" accept=".pdf,.txt" style="display: none;">
                </div>

                <button id="processBtn" class="primary-btn">Process Lesson</button>
            </section>

            <section class="card lab-col">
                <div class="card-header">
                    <span class="icon">🧪</span>
                    <h2>Lab</h2>
                </div>
                <div id="labList" class="list-container">
                    </div>
                <button id="playSession" class="play-btn">▶ Play Hands-Free</button>
            </section>

            <section class="card gallery-col">
                <div class="card-header">
                    <span class="icon">🖼️</span>
                    <h2>Gallery</h2>
                </div>
                <div id="notebookGallery" class="notebook-grid">
                    </div>
                <button id="exportBtn" class="secondary-btn">Export (.json)</button>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</body>
</html>
