<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SOPHIE: Vocab Master</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="apple-touch-icon" href="https://fav.farm/🎧">
    <link rel="icon" href="https://fav.farm/🎧">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <button id="themeToggle" style="background:none; border:none; cursor:pointer; font-size:1.8rem; position:fixed; top:15px; right:15px; z-index: 9999; padding: 5px;">
    ☀️
    </button>
    
    <div id="streakCounter" title="Lern-Serie!" style="position:fixed; top:20px; right:70px; z-index: 9999; background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); padding: 4px 12px; border-radius: 20px; font-weight: 900; color: #e65100; border: 1px solid #ffb74d; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 6px rgba(230, 81, 0, 0.15); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        🔥 <span id="streakNumber">0</span>
    </div>

    <div class="app-container">
        <header>
            <h1>🎧 SOPHIE: Vocab Master</h1>
            <p>Freihändiges Lernuniversum</p>
            <audio id="bgMusic" preload="auto" crossorigin="anonymous" style="display:none;"></audio>
        </header>

        <main class="grid-layout">
            <section class="card input-col">
                <div class="card-header" style="display: flex; flex-direction: column; gap: 10px;">
                    <div style="display: flex; align-items: center;">
                        <span class="icon">📥</span>
                        <h2>Eingabe</h2>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
                        <select id="langSelect" style="flex-grow: 1; padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; background: #f5f5f5; color: #333;">
                            <option value="fr-de">🇫🇷 FR / 🇩🇪 DE</option>
                            <option value="en-es">🇬🇧 EN / 🇪🇸 ES</option>
                            <option value="es-de">🇪🇸 ES / 🇩🇪 DE</option>
                            <option value="en-de">🇬🇧 EN / 🇩🇪 DE</option>
                            <option value="pt-de">🇵🇹 PT / 🇩🇪 DE</option>
                        </select>
                        <button id="swapLangBtn" title="Richtung wechseln" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: #e0e0e0; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">
                            🔄
                        </button>
                    </div>
                </div>
                <textarea id="textInput" placeholder="Hier schreiben oder einfügen..."></textarea>
                
                <div style="margin-top: 15px; display: flex; gap: 10px; flex-direction: column;">
                    <button id="newNoteBtn" class="primary-btn" style="background-color: #f5f5f5; color: #333; border: 1px solid #ccc; width: 100%; border-radius: 8px; padding: 10px; cursor: pointer;">
                        + Neue Notiz
                    </button>
                    <label for="fileUpload" class="primary-btn" style="width: 100%; text-align: center; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 10px; margin-top: -5px;">
                        📄 PDF/TXT hochladen
                    </label>
                    <input type="file" id="fileUpload" accept="image/*, application/pdf, text/plain" style="display:none;">
                </div>
                <button id="processBtn" class="primary-btn" style="margin-top: 15px; width: 100%; border-radius: 8px; cursor: pointer;">Lektion verarbeiten</button>
            </section>

            <section class="card lab-col">
                <div class="card-header">
                    <span class="icon">🧪</span>
                    <h2>Labor</h2>
                </div>
                <div id="labList" class="list-container">
                </div>
                
                <div style="margin-bottom: 10px; display: flex; width: 100%;">
                    <select id="audioMode" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #bae6fd; font-weight: bold; background: #e0f2fe; color: #0369a1; cursor: pointer;">
                        <option value="basic">🎧 Audio: Nur Vokabeln</option>
                        <option value="full">📖 Audio: Mit Kontext</option>
                    </select>
                </div>

                <button id="playSession" class="play-btn">▶ Freihändig abspielen</button>
                <button id="quizBtn" class="secondary-btn" style="margin-top: 10px; background: #673ab7; color: white; border: none; width: 100%; padding: 12px; border-radius: 20px; font-weight: bold; cursor: pointer;">
                    🧠 Vokabel-Quiz starten
                </button>
            </section>

            <section class="card gallery-col">
                <div class="card-header">
                    <span class="icon">🖼️</span>
                    <h2>Galerie</h2>
                </div>
                <div id="notebookGallery" class="notebook-grid">
                </div>
                <button id="exportBtn" class="secondary-btn">Exportieren (.json)</button>
            </section>
        </main>
    </div>
    <script src="app.js?v=final5"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</body>
</html>
