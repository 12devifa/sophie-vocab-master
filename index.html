<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOPHIE | Vocab Master AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="splash-screen">
        <div class="splash-logo">SOPHIE<span>.ai</span></div>
    </div>

    <div class="app-container">
        <header>
            <h1>SOPHIE<span>.ai</span></h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="streakCounter" class="streak-counter">
                    <i class="fas fa-fire"></i> <span id="streakNumber">0</span>
                </div>
                <label class="theme-switch-wrapper">
                    <input type="checkbox" id="themeToggle">
                    <div class="slider">
                        <i class="fas fa-moon slider-icon"></i>
                        <i class="fas fa-sun slider-icon"></i>
                    </div>
                </label>
            </div>
        </header>

        <div class="tools-menu">
            <button class="tool-btn" id="newNoteBtn">
                <i class="fas fa-plus-circle"></i>
                <span>Nuevo</span>
            </button>
            <button class="tool-btn" onclick="document.getElementById('fileUpload').click()">
                <i class="fas fa-file-import"></i>
                <span>Importar</span>
            </button>
            <button class="tool-btn" id="quizBtn">
                <i class="fas fa-brain"></i>
                <span>Quiz</span>
            </button>
            <button class="tool-btn" id="exportBtn">
                <i class="fas fa-download"></i>
                <span>Backup</span>
            </button>
        </div>

        <main>
            <section class="input-section">
                <div class="controls-row">
                    <select id="langSelect">
                        <option value="fr-de">FR Francés / DE Alemán</option>
                        <option value="en-es">EN Inglés / ES Español</option>
                        <option value="es-de">ES Español / DE Alemán</option>
                        <option value="en-de">EN Inglés / DE Alemán</option>
                        <option value="pt-de">PT Portugués / DE Alemán</option>
                    </select>
                    <button class="icon-btn" id="swapLangBtn" title="Invertir Idiomas">
                        <i class="fas fa-retweet"></i>
                    </button>
                </div>

                <textarea id="textInput" placeholder="Pega aquí tus palabras o frases desordenadas..."></textarea>
                <input type="file" id="fileUpload" style="display: none;" accept=".txt,.pdf,image/*">

                <button id="magicOrderBtn" class="primary-btn">
                    <i class="fas fa-wand-magic-sparkles"></i> Ordenar con IA
                </button>
                
                <button id="processBtn" class="primary-btn" style="margin-top: 10px;">
                    <i class="fas fa-layer-group"></i> Crear Tarjetas
                </button>
            </section>

            <section class="lab-section">
                <h2><i class="fas fa-flask"></i> Laboratorio de Estudio</h2>
                <div class="controls-row">
                    <select id="audioMode">
                        <option value="basic">Sólo Vocabulario</option>
                        <option value="full">Vocabulario + Frases</option>
                    </select>
                    <button id="playSession" class="icon-btn" style="width: auto; padding: 0 15px; gap: 8px;">
                        <i class="fas fa-play"></i> Escuchar todo
                    </button>
                </div>
                <div id="labList">
                    </div>
            </section>

            <section class="gallery-section">
                <h2><i class="fas fa-box-archive"></i> Mi Biblioteca</h2>
                <div id="notebookGallery">
                    </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
