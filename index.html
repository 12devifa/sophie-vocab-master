<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SOPHIE: Vocab Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="https://fav.farm/🎧">
    <link rel="icon" href="https://fav.farm/🎧">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <button id="themeToggle" style="background:none; border:none; cursor:pointer; font-size:1.5rem; position:absolute; top:20px; right:20px; z-index: 1000;">
    🌙
</button>
    <div class="app-container">
        <header>
            <h1>🎧 SOPHIE: Vocab Master</h1>
            <p>Freihändiges Lernuniversum</p>
         

<audio id="bgMusic" preload="auto" crossorigin="anonymous" style="display:none;"></audio>
        </header>

        <main class="grid-layout">
<section class="card input-col">
                <div class="card-header">
                    <span class="icon">📥</span>
                    <h2>Eingabe</h2>
                </div>
                <textarea id="textInput" placeholder="Hier schreiben oder einfügen..."></textarea>
                
                <div class="file-actions" style="margin: 10px 0; display: flex; gap: 10px;">
                    <label for="fileUpload" class="secondary-btn" style="flex: 1; text-align: center; cursor: pointer; padding: 8px; font-size: 14px; border: 1px solid #dadce0; border-radius: 20px;">
                        📄 PDF/TXT hochladen
                    </label>
                   <input type="file" id="fileUpload" accept=".pdf,.txt,image/*" style="display: none;">
                </div>

                <button id="processBtn" class="primary-btn">Lektion verarbeiten</button>
            </section>

            <section class="card lab-col">
                <div class="card-header">
                    <span class="icon">🧪</span>
                    <h2>Labor</h2>
                </div>
                <div id="labList" class="list-container">
                    </div>
                <button id="playSession" class="play-btn">▶ Freihändig abspielen</button>
<button id="quizBtn" class="secondary-btn" style="margin-top: 10px; background: #673ab7; color: white; border: none; width: 100%; padding: 12px; border-radius: 20px; font-weight: bold; cursor: pointer;">
    🧠 Vokabel-Quiz starten
</button>
            </section>

            <section class="card gallery-col">
                <div class="card-header">
                    <span class="icon">🖼️</span>
                    <h2>Galerie</h2>
                </div>
                <div id="notebookGallery" class="notebook-grid">
                    </div>
                <button id="exportBtn" class="secondary-btn">Exportieren (.json)</button>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</body>
</html>
